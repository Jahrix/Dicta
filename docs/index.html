<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dicta Updates</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --card: rgba(15, 23, 42, 0.82);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22c55e;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(34, 197, 94, 0.22), transparent 34%),
          linear-gradient(180deg, #020617 0%, #0f172a 100%);
        color: var(--text);
        font-family: "SF Pro Display", "Avenir Next", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 32px));
        padding: 32px;
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dicta Updates</h1>
      <p>GitHub Pages hosts Dicta's Sparkle feed here for in-app update checks.</p>
      <p><a href="./appcast.xml">Open appcast.xml</a></p>
      <p><a href="https://github.com/Jahrix/Dicta/releases">Open GitHub Releases</a></p>
    </main>
  </body>
</html>
